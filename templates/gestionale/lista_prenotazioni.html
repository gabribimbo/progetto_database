{% extends "gestionale/base.html" %}
{% block title %}Prenotazioni{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0">Prenotazioni</h1>
    {% if can_create_prenotazione %}
        <a class="btn btn-primary" href="{% url 'crea_prenotazione' %}">Nuova prenotazione</a>
    {% endif %}
</div>
<div class="panel">
    {% include "gestionale/partials/tabella_prenotazioni.html" with prenotazioni=prenotazioni %}
</div>
{% endblock %}
